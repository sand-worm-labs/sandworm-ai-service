services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  ai:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    command: uvicorn src.__main__:app --host 0.0.0.0 --port 8000 --reload
